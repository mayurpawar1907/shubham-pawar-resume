<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00f0ff" />
    <meta name="description" content="Shubham Patil - Full Stack MERN Developer | React.js | Node.js | Portfolio" />
    <meta name="keywords" content="MERN, React, Node.js, Web Developer, Portfolio" />
    <meta property="og:title" content="Shubham Patil - Full Stack Developer" />
    <meta property="og:description" content="Explore my portfolio showcasing MERN stack projects and expertise" />
    
    <title>Shubham Patil - Full Stack Developer Portfolio</title>
    
    <!-- Modern Favicon with Portfolio Icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%2300f0ff;stop-opacity:1' /><stop offset='100%' style='stop-color:%23a855f7;stop-opacity:1' /></linearGradient></defs><rect fill='url(%23grad)' width='100' height='100' rx='15'/><rect x='25' y='30' width='50' height='40' fill='none' stroke='%23000' stroke-width='2.5' rx='4'/><rect x='30' y='35' width='15' height='15' fill='%23000' rx='2'/><rect x='55' y='35' width='15' height='15' fill='%23000' rx='2'/><line x1='35' y1='55' x2='65' y2='55' stroke='%23000' stroke-width='2'/></svg>" />
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body, #root {
        width: 100%;
        height: 100%;
      }
      
      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 25%, #0d1f3c 50%, #1a1f5e 75%, #0a0e27 100%);
        background-attachment: fixed;
        color: #ffffff;
        overflow-x: hidden;
        position: relative;
      }
      
      /* Premium animated background with geometric elements */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 90% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
        animation: gradientShift 20s ease-in-out infinite;
      }
      
      body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(45deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
          linear-gradient(-45deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
        z-index: 0;
      }
      
      @keyframes gradientShift {
        0%, 100% {
          filter: brightness(1) saturate(1);
        }
        50% {
          filter: brightness(1.1) saturate(1.2);
        }
      }
      
      #root {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      
      /* Smooth scroll behavior */
      html {
        scroll-behavior: smooth;
      }
      
      /* Premium Custom scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      
      ::-webkit-scrollbar-track {
        background: linear-gradient(to bottom, rgba(0, 240, 255, 0.05), rgba(168, 85, 247, 0.05));
        border-radius: 10px;
      }
      
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(to bottom, #00f0ff, #a855f7, #f472b6);
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        border: 2px solid rgba(0, 240, 255, 0.1);
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(to bottom, #00f0ff, #f472b6);
        box-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
      }
      
      /* Firefox scrollbar */
      * {
        scrollbar-color: linear-gradient(to bottom, #00f0ff, #a855f7) rgba(0, 240, 255, 0.05);
        scrollbar-width: thin;
      }
    </style>

  </head>
  <body>
    <div id="root"></div>
    

  

    <!-- ✅ Then your React/Vite app -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
